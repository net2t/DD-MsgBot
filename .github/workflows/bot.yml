name: DD-Msg-Bot - Message Sender

on:
  # ── Manual trigger — send messages on demand ──────────────────────────────
  workflow_dispatch:
    inputs:
      max_items:
        description: 'Max messages to send (0 = unlimited)'
        required: false
        default: '0'
      debug:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean

  # ── Scheduled: Send messages every 2 hours ────────────────────────────────
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours — send messages

permissions:
  contents: read

jobs:
  send-messages:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Chrome
        run: google-chrome --version

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Determine parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "max=${{ github.event.inputs.max_items }}" >> $GITHUB_OUTPUT
            echo "debug=${{ github.event.inputs.debug }}" >> $GITHUB_OUTPUT
          else
            # Scheduled run = send messages
            echo "max=0" >> $GITHUB_OUTPUT
            echo "debug=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Messages (max ${{ steps.params.outputs.max }})
        env:
          DD_LOGIN_EMAIL:          ${{ secrets.DD_LOGIN_EMAIL }}
          DD_LOGIN_PASS:           ${{ secrets.DD_LOGIN_PASS }}
          DD_LOGIN_EMAIL2:         ${{ secrets.DD_LOGIN_EMAIL2 }}
          DD_LOGIN_PASS2:          ${{ secrets.DD_LOGIN_PASS2 }}
          DD_SHEET_ID:             ${{ secrets.DD_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          DD_HEADLESS:             "1"
          DD_DEBUG:                "${{ steps.params.outputs.debug }}"
        run: |
          python main.py msg --max ${{ steps.params.outputs.max }} $([ "${{ steps.params.outputs.debug }}" = "true" ] && echo "--debug" || echo "")

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 3
