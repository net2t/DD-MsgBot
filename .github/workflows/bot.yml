# ============================================================================
# DD-Msg-Bot — Single Workflow File
# ============================================================================
# All 5 bot modes in one file.
# Schedules:
#   🎀 Rekhta   — every 1 hour
#   🎀 Message  — once a day (06:00 PKT = 01:00 UTC)
#   🎀 Post     — every 2 hours
#   🎀 Inbox    — every 15 minutes
#   🎀 Activity — every 18 minutes
#
# Manual trigger: Go to Actions tab → DD-Msg-Bot → Run workflow
# Then pick which mode you want to run.
# ============================================================================

name: DD-Msg-Bot

on:

  # ── Manual trigger with mode selector ──────────────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Which mode to run"
        type: choice
        required: true
        default: msg
        options:
          - rekhta
          - msg
          - post
          - inbox
          - activity
          - logs
          - setup
      max_items:
        description: "Max items to process (leave empty for unlimited)"
        type: string
        required: false
        default: ""
      debug:
        description: "Enable debug logging"
        type: boolean
        required: false
        default: false

  # ── Scheduled triggers ──────────────────────────────────────────────────────
  schedule:
    # 🎀 Rekhta — every 1 hour (at :00)
    - cron: "0 * * * *"
    # 🎀 Message — once a day at 01:00 UTC (06:00 PKT)
    - cron: "0 1 * * *"
    # 🎀 Post — every 2 hours (at :05 to avoid collision with Rekhta)
    - cron: "5 */2 * * *"
    # 🎀 Inbox — every 15 minutes
    - cron: "*/15 * * * *"
    # 🎀 Activity — every 18 minutes
    - cron: "*/18 * * * *"

# Only one instance of the bot runs at a time — prevents sheet conflicts
concurrency:
  group: dd-msg-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install Chrome ──────────────────────────────────────────────────
      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 4. Install Python dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Write Google credentials to file ────────────────────────────────
      - name: Write credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python - << 'PY'
          import os, sys
          data = os.getenv('GOOGLE_CREDENTIALS_JSON', '')
          if not data:
              sys.exit('ERROR: GOOGLE_CREDENTIALS_JSON secret is not set')
          open('credentials.json', 'w').write(data)
          print('credentials.json written')
          PY

      # ── 6. Resolve which mode to run ───────────────────────────────────────
      # For scheduled runs: GitHub Actions does not tell you which cron fired.
      # We detect by current minute/hour using Python.
      - name: Resolve run mode
        id: resolve
        env:
          MANUAL_MODE:  ${{ github.event.inputs.mode }}
          MANUAL_MAX:   ${{ github.event.inputs.max_items }}
          MANUAL_DEBUG: ${{ github.event.inputs.debug }}
        run: |
          python - << 'PY'
          import os, datetime

          manual_mode  = os.getenv('MANUAL_MODE',  '').strip()
          manual_max   = os.getenv('MANUAL_MAX',   '').strip()
          manual_debug = os.getenv('MANUAL_DEBUG', 'false').strip().lower() == 'true'

          if manual_mode:
              # Manual workflow_dispatch — use exactly what was chosen
              mode  = manual_mode
              max_n = manual_max
              debug = '1' if manual_debug else '0'
              print(f"Manual trigger: mode={mode} max={max_n or 'unlimited'} debug={debug}")
          else:
              # Scheduled run — decide mode from current UTC time
              now    = datetime.datetime.utcnow()
              hour   = now.hour
              minute = now.minute
              debug  = '0'
              max_n  = ''

              # Priority order (most frequent first):
              # Every 15 min → inbox
              # Every 18 min → activity
              # Every hour   → rekhta
              # Every 2 hour → post
              # Once a day   → msg

              if minute % 15 == 0 and minute % 18 != 0:
                  mode = 'inbox'
              elif minute % 18 == 0 and minute % 15 != 0:
                  mode = 'activity'
              elif minute == 0 and hour % 2 == 1:
                  # Odd hours :00 → rekhta
                  mode = 'rekhta'
              elif minute == 5 and hour % 2 == 0:
                  # Even hours :05 → post
                  mode = 'post'
              elif hour == 1 and minute == 0:
                  # 01:00 UTC → message (once a day)
                  mode = 'msg'
              else:
                  # Fallback for overlapping crons — pick by minute
                  if minute % 15 == 0:
                      mode = 'inbox'
                  elif minute % 18 == 0:
                      mode = 'activity'
                  else:
                      mode = 'inbox'  # safe default

              print(f"Scheduled trigger: UTC {hour:02d}:{minute:02d} → mode={mode}")

          # Write to GITHUB_OUTPUT for next steps
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"mode={mode}\n")
              f.write(f"max_items={max_n}\n")
              f.write(f"debug={debug}\n")
          PY

      # ── 7. Run the bot ─────────────────────────────────────────────────────
      - name: Run bot — ${{ steps.resolve.outputs.mode }}
        env:
          DD_LOGIN_EMAIL:          ${{ secrets.DD_LOGIN_EMAIL }}
          DD_LOGIN_PASS:           ${{ secrets.DD_LOGIN_PASS }}
          DD_LOGIN_EMAIL2:         ${{ secrets.DD_LOGIN_EMAIL2 }}
          DD_LOGIN_PASS2:          ${{ secrets.DD_LOGIN_PASS2 }}
          DD_SHEET_ID:             ${{ secrets.DD_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          DD_HEADLESS:             "1"
          DD_DEBUG:                ${{ steps.resolve.outputs.debug }}
        run: |
          MODE="${{ steps.resolve.outputs.mode }}"
          MAX="${{ steps.resolve.outputs.max_items }}"

          ARGS=("$MODE")
          [[ -n "$MAX" ]] && ARGS+=("--max" "$MAX")
          [[ "${{ steps.resolve.outputs.debug }}" == "1" ]] && ARGS+=("--debug")

          echo "Running: python main.py ${ARGS[*]}"
          python main.py "${ARGS[@]}"

      # ── 8. Upload logs as artifact (even if bot failed) ────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ steps.resolve.outputs.mode }}-${{ github.run_number }}
          path: logs/*.log
          if-no-files-found: ignore
