name: DD-Msg-Bot - Message & Inbox Manager

on:
  # ── Manual trigger — choose mode on demand ───────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run'
        required: true
        default: 'msg'
        type: choice
        options:
          - msg
          - messages
      max_items:
        description: 'Max items to process (0 = unlimited)'
        required: false
        default: '100'
      debug:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean

  # ── Scheduled: Send messages every 30 minutes ───────────────────────────────
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes — send messages

permissions:
  contents: read

jobs:
  send-messages:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Chrome
        run: google-chrome --version

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Determine parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "max=${{ github.event.inputs.max_items }}" >> $GITHUB_OUTPUT
            echo "debug=${{ github.event.inputs.debug }}" >> $GITHUB_OUTPUT
          else
            # Scheduled run = send messages
            echo "mode=msg" >> $GITHUB_OUTPUT
            echo "max=100" >> $GITHUB_OUTPUT
            echo "debug=false" >> $GITHUB_OUTPUT
          fi

      - name: Run DD-Msg-Bot (${{ steps.params.outputs.mode }} mode - max ${{ steps.params.outputs.max }})
        env:
          DD_LOGIN_EMAIL:          ${{ secrets.DD_LOGIN_EMAIL }}
          DD_LOGIN_PASS:           ${{ secrets.DD_LOGIN_PASS }}
          DD_LOGIN_EMAIL2:         ${{ secrets.DD_LOGIN_EMAIL2 }}
          DD_LOGIN_PASS2:          ${{ secrets.DD_LOGIN_PASS2 }}
          DD_SHEET_ID:             ${{ secrets.DD_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DD_HEADLESS:             "1"
          DD_DEBUG:                "${{ steps.params.outputs.debug }}"
        run: |
          python main.py ${{ steps.params.outputs.mode }} --max ${{ steps.params.outputs.max }} $([ "${{ steps.params.outputs.debug }}" = "true" ] && echo "--debug" || echo "")

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 3
