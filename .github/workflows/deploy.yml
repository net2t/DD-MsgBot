name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install streamlit

    - name: Create static demo
      run: |
        mkdir -p dist
        cat > dist/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>DD Bot Professional Dashboard</title>
            <style>
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                }
                
                body {
                    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: white;
                }
                
                .container {
                    background: rgba(255, 255, 255, 0.1);
                    backdrop-filter: blur(20px);
                    border-radius: 20px;
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
                    padding: 3rem;
                    text-align: center;
                    max-width: 600px;
                    margin: 2rem;
                }
                
                .logo {
                    font-size: 4rem;
                    margin-bottom: 1rem;
                    animation: float 3s ease-in-out infinite;
                }
                
                h1 {
                    background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
                    background-size: 200% auto;
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                    font-size: 2.5rem;
                    font-weight: 700;
                    margin-bottom: 1rem;
                    animation: shine 3s linear infinite;
                }
                
                .description {
                    color: rgba(255, 255, 255, 0.9);
                    font-size: 1.1rem;
                    line-height: 1.6;
                    margin-bottom: 2rem;
                }
                
                .features {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                    gap: 1rem;
                    margin: 2rem 0;
                }
                
                .feature {
                    background: rgba(255, 255, 255, 0.1);
                    padding: 1.5rem;
                    border-radius: 15px;
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    transition: transform 0.3s ease;
                }
                
                .feature:hover {
                    transform: translateY(-5px);
                }
                
                .feature-icon {
                    font-size: 2rem;
                    margin-bottom: 0.5rem;
                }
                
                .buttons {
                    display: flex;
                    gap: 1rem;
                    justify-content: center;
                    flex-wrap: wrap;
                    margin-top: 2rem;
                }
                
                .btn {
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    color: white;
                    text-decoration: none;
                    padding: 1rem 2rem;
                    border-radius: 10px;
                    font-weight: 600;
                    transition: all 0.3s ease;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
                    display: inline-flex;
                    align-items: center;
                    gap: 0.5rem;
                }
                
                .btn:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
                }
                
                .btn-primary {
                    background: linear-gradient(135deg, #f093fb, #f5576c);
                    box-shadow: 0 4px 20px rgba(240, 147, 251, 0.4);
                }
                
                .btn-primary:hover {
                    box-shadow: 0 6px 30px rgba(240, 147, 251, 0.6);
                }
                
                @keyframes float {
                    0%, 100% { transform: translateY(0px); }
                    50% { transform: translateY(-10px); }
                }
                
                @keyframes shine {
                    to { background-position: 200% center; }
                }
                
                .tech-stack {
                    margin-top: 2rem;
                    padding-top: 2rem;
                    border-top: 1px solid rgba(255, 255, 255, 0.2);
                }
                
                .tech-stack h3 {
                    margin-bottom: 1rem;
                    color: rgba(255, 255, 255, 0.8);
                }
                
                .tech-tags {
                    display: flex;
                    gap: 0.5rem;
                    justify-content: center;
                    flex-wrap: wrap;
                }
                
                .tag {
                    background: rgba(255, 255, 255, 0.2);
                    padding: 0.5rem 1rem;
                    border-radius: 20px;
                    font-size: 0.9rem;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <div class="logo">🤖</div>
                <h1>DD Bot Dashboard</h1>
                <p class="description">
                    A colorful, professional dashboard with glowing UI/UX design for managing your DD Bot operations. 
                    Features glassmorphism effects, gradient backgrounds, and smooth animations.
                </p>
                
                <div class="features">
                    <div class="feature">
                        <div class="feature-icon">🎨</div>
                        <h3>Modern Design</h3>
                        <p>Glassmorphism effects with glowing UI elements</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">📊</div>
                        <h3>Analytics</h3>
                        <p>Real-time statistics and performance metrics</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">📱</div>
                        <h3>Responsive</h3>
                        <p>Works perfectly on desktop and mobile devices</p>
                    </div>
                </div>
                
                <div class="buttons">
                    <a href="https://github.com/net2t/DD-Msg-Bot" class="btn btn-primary">
                        <span>📂</span> View Source Code
                    </a>
                    <a href="https://github.com/net2t/DD-Msg-Bot/blob/main/README_DASHBOARD.md" class="btn">
                        <span>📖</span> Documentation
                    </a>
                </div>
                
                <div class="tech-stack">
                    <h3>Built With</h3>
                    <div class="tech-tags">
                        <span class="tag">Streamlit</span>
                        <span class="tag">Python</span>
                        <span class="tag">CSS3</span>
                        <span class="tag">Google Sheets</span>
                        <span class="tag">Pandas</span>
                    </div>
                </div>
            </div>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
