name: Message Bot

"on":
  workflow_dispatch: {}
  schedule:
    - cron: "0 */2 * * *"

jobs:
  run:
    uses: ./.github/workflows/dashboard.yml
    with:
      mode: msg
      max_profiles: ""
      dry_run: false
      populate_img_links: false
      populate_limit: ""
      populate_write: false
      headless: true
      debug: false
    secrets: inherit
